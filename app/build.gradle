plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
	// Charting api/runtime
	implementation group: 'org.jfree', name: 'jfreechart', version: '1.0.17'
	// persistence API
	implementation group: 'jakarta.persistence', name: 'jakarta.persistence-api', version: '3.0.0'
	implementation group: 'org.eclipse.persistence', name: 'eclipselink', version: '3.0.2'
	// DBMS
	implementation group: 'org.apache.derby', name: 'derby', version: '10.15.2.0'
	implementation group: 'org.apache.derby', name: 'derbyshared', version: '10.15.2.0'
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
implementation 'org.eclipse.persistence:eclipselink:4.0.2'
    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'app.App'
}
jar {
archiveFileName = 'badBM.jar'
  manifest {
    attributes 'Main-Class': application.mainClass
  }
}
task customFatJar(type: Jar) {
    dependsOn classes  // ensure classes are compiled first
    
    manifest {
        attributes 'Main-Class': 'app.App'
    }
    archiveBaseName = 'badBM'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    
    // Include your compiled classes
    from sourceSets.main.output
    
    // Include all runtime dependencies
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    
    exclude 'META-INF/*.RSA', 'META-INF/*.SF', 'META-INF/*.DSA'
}

sourceSets {
    main {
        // Registers the Java output directory as a valid resource output
        output.dir(java.classesDirectory)
    }
}
tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
